defaults:
  - _self_
  - augmentations: asymmetric.yaml
  - wandb: private.yaml
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

# disable hydra outputs
hydra:
  output_subdir: null
  run:
    dir: .

name: "byol-ta-cifar10-no-projector-no-residual-4head-0.5-dropout-contractive-query-key" # change here for cifar100
method: "byol-ta"
backbone:
  name: "resnet18"
method_kwargs:
  proj_hidden_dim: 4096
  proj_output_dim: 256
  pred_hidden_dim: 4096
  query_dim: 128 
  num_heads: 4
  attn_dropout: 0.5
  proj_dropout: 0.0
momentum:
  base_tau: 0.99
  final_tau: 1.0
data:
  dataset: cifar10 # change here for cifar100
  train_path: "./datasets"
  val_path: "./datasets"
  format: "image_folder"
  num_workers: 4
optimizer:
  name: "adamw"
  batch_size: 256
  lr: 1.0e-4
  classifier_lr: 1.0e-4
  ta_lr: 1.0e-4
  weight_decay: 0.01
  kwargs:
    betas: [0.9, 0.999]
scheduler:
  name: "warmup_cosine"
checkpoint:
  enabled: True
  dir: "trained_models"
  frequency: 1
# auto_resume:
#   enabled: True

# overwrite PL stuff
max_epochs: 1000
devices: [0]
sync_batchnorm: True
accelerator: "gpu"
strategy: "ddp"
precision: 16
